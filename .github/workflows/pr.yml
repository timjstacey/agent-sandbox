name: PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: actionlint
        uses: reviewdog/action-actionlint@v1

      - name: hadolint
        uses: hadolint/hadolint-action@v3.3.0
        with:
          dockerfile: ./Dockerfile
          ignore: DL3008

      - name: compose validate
        run: |
          export HOST_USER="$(id -un)"
          export HOST_UID="$(id -u)"
          export HOST_GID="$(id -g)"
          docker compose -f compose.yml config --quiet

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: agent-sandbox:pr
          cache-from: type=registry,ref=ghcr.io/timjstacey/agent-sandbox:buildcache

      - name: Smoke - static tool versions
        run: |
          docker run --rm \
            -e HOST_USER="$(id -un)" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e SKIP_PROVISION=1 \
            agent-sandbox:pr bash -c '
              set -euxo pipefail
              fnm --version
              gh --version
              wt --version
              git --version
            '

      - name: Smoke - user/UID identity
        run: |
          docker run --rm \
            -e HOST_USER="$(id -un)" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e SKIP_PROVISION=1 \
            agent-sandbox:pr bash -c '
              set -euxo pipefail
              [ "$(id -un)" = "$HOST_USER" ]
              [ "$(id -u)" = "$HOST_UID" ]
              [ "$(id -g)" = "$HOST_GID" ]
              [ "$HOME" = "/home/$(id -un)" ]
            '

      - name: Smoke - bashrc claude() shim
        run: |
          docker run --rm \
            -e HOST_USER="$(id -un)" \
            -e HOST_UID="$(id -u)" \
            -e HOST_GID="$(id -g)" \
            -e SKIP_PROVISION=1 \
            agent-sandbox:pr bash -ic 'type claude | grep -q -- "--mcp-config"'
