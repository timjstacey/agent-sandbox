# Docker Compose stack for agent-sandbox.
# Two services on a shared internal bridge network:
#   - agent:          built from ./Dockerfile; interactive Claude Code session
#   - playwright-mcp: Microsoft Playwright MCP sidecar (no host port exposure)
#
# Usage:
#   ./bin/agent-sandbox setup             # one-time repo-local Claude state init
#   ./bin/agent-sandbox build             # build agent image
#   ./bin/agent-sandbox                   # interactive bash (auto-starts sidecar)
#   ./bin/agent-sandbox claude            # launch Claude Code directly

# Pin the project name as a backstop: bin/agent-sandbox exports
# COMPOSE_PROJECT_NAME=agent-sandbox-${HOST_USER} (which takes precedence), but
# this prevents a stray manual `docker compose` from forking a project keyed on
# the working-dir basename and spawning a duplicate playwright-mcp sidecar.
name: agent-sandbox

services:

  agent:
    build:
      context: .
    user: "0:0"
    environment:
      HOST_USER: "${HOST_USER:?run via bin/agent-sandbox}"
      HOST_UID:  "${HOST_UID:?}"
      HOST_GID:  "${HOST_GID:?}"
      SSH_AUTH_SOCK: /ssh-agent
      GH_TOKEN: ${GH_TOKEN:-}
    depends_on:
      - playwright-mcp
    volumes:
      # Named volume persists $HOME (provisioning marker, Node, pnpm, bun, claude)
      - agent-home:/home/${HOST_USER}
      # Repos bind (mirrored path so container ↔ host paths match)
      - ${PROJECTS_DIR:-${HOME}/Repositories}:/home/${HOST_USER}/${PROJECTS_BASENAME:-Repositories}
      # Claude state (repo-local, committed settings + gitignored creds)
      - ./.claude:/home/${HOST_USER}/.claude
      - ./.claude.json:/home/${HOST_USER}/.claude.json
      # Worktrunk config
      - ./docker/wt-config.toml:/home/${HOST_USER}/.config/worktrunk/config.toml
      # Identity + tool configs (wrapper creates host dirs if missing)
      - ${HOME}/.gitconfig:/home/${HOST_USER}/.gitconfig:ro
      - ${HOME}/.config/gh:/home/${HOST_USER}/.config/gh
      - ${SSH_AUTH_SOCK:-/tmp/ssh-auth-sock}:/ssh-agent
    networks:
      - internal

  playwright-mcp:
    # TODO: pin to a specific digest or immutable tag before production use.
    # e.g. mcr.microsoft.com/playwright/mcp@sha256:<digest>
    image: mcr.microsoft.com/playwright/mcp:latest
    # Image entrypoint defaults to stdio. Override to bind SSE on the internal
    # network so the agent service can reach it at http://playwright-mcp:8931/sse.
    command: ["--headless", "--browser", "chromium", "--no-sandbox", "--host", "0.0.0.0", "--port", "8931"]
    # No host port mapping — only reachable on the internal bridge network.
    networks:
      - internal

volumes:
  agent-home:

networks:
  internal:
    driver: bridge
