# Docker Compose stack for agent-sandbox.
# Two services on a shared internal bridge network:
#   - agent:          built from ./Dockerfile; interactive Claude Code session
#   - playwright-mcp: Microsoft Playwright MCP sidecar (no host port exposure)
#
# Usage:
#   ./bin/agent-sandbox setup             # one-time repo-local Claude state init
#   ./bin/agent-sandbox build             # build agent image
#   docker compose up -d playwright-mcp   # start playwright-mcp sidecar in background
#   ./bin/agent-sandbox                   # interactive bash
#   ./bin/agent-sandbox claude            # launch Claude Code directly

services:

  agent:
    build:
      context: .
      args:
        # Wrapper script (bin/agent-sandbox build) exports AGENT_UID/GID from
        # `id -u` / `id -g` so files written by the container appear owned by
        # the host user. Fallback 1000 covers direct `docker compose build`.
        AGENT_UID: "${AGENT_UID:-1000}"
        AGENT_GID: "${AGENT_GID:-1000}"
    depends_on:
      - playwright-mcp
    volumes:
      # Host repositories — mirrored path so copy/paste paths work identically
      - ${HOME}/Repositories:/home/agent/Repositories
      # Claude state — container-local, separate from host session.
      # Kept inside the repo (gitignored) so each clone/worktree gets its own
      # container login. Avoids ACL drift from host claude rewriting its files
      # atomically (which strips agent's ACL entry). First container run will
      # prompt /login; credentials persist in ./.claude/.credentials.json.
      - ./.claude:/home/agent/.claude
      - ./.claude.json:/home/agent/.claude.json
      # Git identity
      - ${HOME}/.gitconfig:/home/agent/.gitconfig:ro
      # GitHub CLI config (read-write so auth tokens can refresh)
      - ${HOME}/.config/gh:/home/agent/.config/gh
      # Gitea tea CLI config (read-write so auth tokens can refresh)
      - ${HOME}/.config/tea:/home/agent/.config/tea
      # SSH agent socket forwarding — container never holds private keys
      - ${SSH_AUTH_SOCK}:/ssh-agent
    environment:
      SSH_AUTH_SOCK: /ssh-agent
    networks:
      - internal

  playwright-mcp:
    # TODO: pin to a specific digest or immutable tag before production use.
    # e.g. mcr.microsoft.com/playwright/mcp@sha256:<digest>
    image: mcr.microsoft.com/playwright/mcp:latest
    # Image entrypoint defaults to stdio. Override to bind SSE on the internal
    # network so the agent service can reach it at http://playwright-mcp:8931/sse.
    command: ["--headless", "--browser", "chromium", "--no-sandbox", "--host", "0.0.0.0", "--port", "8931"]
    # No host port mapping — only reachable on the internal bridge network.
    networks:
      - internal

networks:
  internal:
    driver: bridge
